<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room: {{ room_name }}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; display: flex; gap: 20px; }
        #main-chat { flex: 1; }
        #sidebar { width: 200px; border-left: 1px solid #ccc; padding-left: 20px; }
        #chat-log { width: 100%; height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; background: #f9f9f9; }
        #chat-message-input { width: calc(100% - 80px); padding: 10px; }
        #chat-message-submit { width: 70px; padding: 10px; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; max-width: 70%; word-wrap: break-word; position: relative; }
        .message.own { align-self: flex-end; background-color: #dcf8c6; border-bottom-right-radius: 0; }
        .message.other { align-self: flex-start; background-color: #ffffff; border-bottom-left-radius: 0; border: 1px solid #eee; }
        .sender-name { font-size: 0.8em; font-weight: bold; margin-bottom: 4px; color: #555; }
        .timestamp { font-size: 0.7em; color: #888; margin-left: 10px; float: right; margin-top: 4px; }
        .read-status { font-size: 0.8em; color: #34b7f1; margin-left: 5px; font-weight: bold; }
        #typing-indicator { font-style: italic; color: #888; height: 20px; margin-bottom: 10px; }
        .online-user { margin-bottom: 5px; color: #28a745; font-weight: bold; }
        .online-user::before { content: '● '; }
    </style>
</head>
<body>
    <div id="main-chat">
        <h1>Chat Room: {{ room_name }} (as {{ request.user.username }})</h1>
        <a href="{% url 'login' %}?next=/" style="font-size: 0.8em;">Change User / Login</a>
        <br><br>
        <div id="chat-log"></div>
        <div id="typing-indicator"></div>
        <input id="chat-message-input" type="text" placeholder="Type a message..."><br><br>
        <input id="chat-message-submit" type="button" value="Send">
    </div>
    
    <div id="sidebar">
        <h3>Online Users</h3>
        <div id="online-users-list"></div>
    </div>

    {{ room_name|json_script:"room-name" }}
    {{ request.user.username|json_script:"current-username" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        const currentUsername = JSON.parse(document.getElementById('current-username').textContent);
        const chatLog = document.querySelector('#chat-log');
        const typingIndicator = document.querySelector('#typing-indicator');
        const onlineUsersList = document.querySelector('#online-users-list');
        
        let onlineUsers = new Set();
        let typingTimeout;

        function updateOnlineUsersUI() {
            onlineUsersList.innerHTML = '';
            onlineUsers.forEach(user => {
                const div = document.createElement('div');
                div.className = 'online-user';
                div.textContent = user;
                onlineUsersList.appendChild(div);
            });
        }

        function appendMessage(id, message, timestamp, sender, is_read) {
            let existingMsg = document.getElementById('msg-' + id);
            if (existingMsg) return; // Prevent duplicate appends if needed

            const messageElement = document.createElement('div');
            messageElement.id = 'msg-' + id;
            messageElement.className = 'message ' + (sender === currentUsername ? 'own' : 'other');
            
            let dateStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                dateStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            
            let readMark = '';
            if (sender === currentUsername) {
                readMark = `<span class="read-status" id="read-status-${id}">${is_read ? '✓✓' : '✓'}</span>`;
            }

            messageElement.innerHTML = `
                ${sender !== currentUsername ? `<div class="sender-name">${sender}</div>` : ''}
                <span class="content">${message}</span>
                <span class="timestamp">${dateStr} ${readMark}</span>
            `;
            chatLog.appendChild(messageElement);
            chatLog.scrollTop = chatLog.scrollHeight;

            // Send read receipt if it's someone else's message and it's not read yet
            if (sender !== currentUsername && !is_read) {
                if (chatSocket.readyState === WebSocket.OPEN) {
                    chatSocket.send(JSON.stringify({
                        'type': 'read',
                        'message_id': id
                    }));
                }
            }
        }

        // Load past messages via DRF API
        fetch('/api/messages/' + roomName + '/')
            .then(response => response.json())
            .then(data => {
                data.forEach(msg => {
                    appendMessage(msg.id, msg.content, msg.timestamp, msg.sender_username, msg.is_read);
                });
            });

        // Setup WebSocket
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
        );

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'chat_message') {
                appendMessage(data.message_id, data.message, data.timestamp, data.sender_username, false);
            } else if (data.type === 'user_join') {
                onlineUsers.add(data.username);
                updateOnlineUsersUI();
            } else if (data.type === 'user_leave') {
                onlineUsers.delete(data.username);
                updateOnlineUsersUI();
            } else if (data.type === 'typing') {
                if (data.username !== currentUsername) {
                    if (data.is_typing) {
                        typingIndicator.textContent = data.username + " is typing...";
                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            typingIndicator.textContent = '';
                        }, 3000);
                    } else {
                        typingIndicator.textContent = '';
                    }
                }
            } else if (data.type === 'read') {
                let statusEl = document.getElementById('read-status-' + data.message_id);
                if (statusEl) {
                    statusEl.textContent = '✓✓';
                }
            }
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };

        const messageInputDom = document.querySelector('#chat-message-input');
        
        messageInputDom.focus();
        
        let isTyping = false;
        let myTypingTimeout;

        messageInputDom.addEventListener('input', function() {
            if (!isTyping) {
                isTyping = true;
                chatSocket.send(JSON.stringify({
                    'type': 'typing',
                    'is_typing': true
                }));
            }
            clearTimeout(myTypingTimeout);
            myTypingTimeout = setTimeout(() => {
                isTyping = false;
                chatSocket.send(JSON.stringify({
                    'type': 'typing',
                    'is_typing': false
                }));
            }, 2000);
        });

        messageInputDom.onkeyup = function(e) {
            if (e.keyCode === 13) {  // enter, return
                document.querySelector('#chat-message-submit').click();
            }
        };

        document.querySelector('#chat-message-submit').onclick = function(e) {
            const message = messageInputDom.value;
            if (message.trim() !== "") {
                chatSocket.send(JSON.stringify({
                    'type': 'chat_message',
                    'message': message
                }));
                messageInputDom.value = '';
                
                // Stop typing immediately
                clearTimeout(myTypingTimeout);
                isTyping = false;
                chatSocket.send(JSON.stringify({
                    'type': 'typing',
                    'is_typing': false
                }));
            }
        };
    </script>
</body>
</html>
