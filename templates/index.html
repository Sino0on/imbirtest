<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room: {{ room_name }}</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #chat-log { width: 100%; height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #chat-message-input { width: calc(100% - 80px); padding: 10px; }
        #chat-message-submit { width: 70px; padding: 10px; }
        .message { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .timestamp { font-size: 0.8em; color: #888; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Chat Room: {{ room_name }}</h1>
    <div id="chat-log"></div><br>
    <input id="chat-message-input" type="text" size="100" placeholder="Type a message..."><br>
    <input id="chat-message-submit" type="button" value="Send">

    {{ room_name|json_script:"room-name" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        const chatLog = document.querySelector('#chat-log');

        // Load past messages via DRF API
        fetch('/api/messages/' + roomName + '/')
            .then(response => response.json())
            .then(data => {
                data.forEach(msg => {
                    appendMessage(msg.content, msg.timestamp);
                });
            });

        // Setup WebSocket
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
        );

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            appendMessage(data.message, data.timestamp);
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };

        document.querySelector('#chat-message-input').focus();
        document.querySelector('#chat-message-input').onkeyup = function(e) {
            if (e.keyCode === 13) {  // enter, return
                document.querySelector('#chat-message-submit').click();
            }
        };

        document.querySelector('#chat-message-submit').onclick = function(e) {
            const messageInputDom = document.querySelector('#chat-message-input');
            const message = messageInputDom.value;
            if (message.trim() !== "") {
                chatSocket.send(JSON.stringify({
                    'message': message
                }));
                messageInputDom.value = '';
            }
        };

        function appendMessage(message, timestamp) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            let dateStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                dateStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            }
            
            messageElement.innerHTML = `<span class="timestamp">${dateStr}</span><span class="content">${message}</span>`;
            chatLog.appendChild(messageElement);
            chatLog.scrollTop = chatLog.scrollHeight;
        }
    </script>
</body>
</html>
